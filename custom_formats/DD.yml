trash_id: c2998bd0d90ed5621d8df281e839436e
name: DD
includeCustomFormatWhenRenaming: false
description: "DD (Dolby Digital \u2013 lossy)\n\nFrom Wikipedia, the free encyclopedia\
  \ (https://en.wikipedia.org/wiki/Dolby_Digital)\n\nDolby Digital, also known as\
  \ Dolby AC-3, is a lossy audio compression format."
tags:
- Release Title
- Trash Guides
conditions:
- name: Basic Dolby Digital
  negate: false
  required: true
  type: release_title
  _raw_pattern: \bdd[^a-z+]|(?<!e-)\b(ac-?3)\b
  pattern: Basic Dolby Digital
- name: Not Dolby Digital Plus
  negate: true
  required: true
  type: release_title
  _raw_pattern: \bdd[p+]|\b(e[-_. ]?ac-?3)\b
  pattern: Not Dolby Digital Plus
- name: Not TrueHD/ATMOS
  negate: true
  required: true
  type: release_title
  _raw_pattern: true[ .-]?hd|\batmos(\b|\d)
  pattern: Not TrueHD_ATMOS (1)
- name: Not DTS
  negate: true
  required: true
  type: release_title
  _raw_pattern: \bdts(\b|\d)
  pattern: Not DTS
- name: Not FLAC
  negate: true
  required: true
  type: release_title
  _raw_pattern: \bflac(\b|\d)
  pattern: Not FLAC
- name: Not AAC
  negate: true
  required: true
  type: release_title
  _raw_pattern: \baac(\b|\d)
  pattern: Not AAC
- name: Not PCM
  negate: true
  required: true
  type: release_title
  _raw_pattern: \b(l?)pcm(\b|\d)
  pattern: Not PCM
tests: []
