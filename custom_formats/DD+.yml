name: DD+
includeCustomFormatWhenRenaming: false
description: "DD+ (Dolby Digital Plus \u2013 lossy)\n\nFrom Wikipedia, the free encyclopedia\
  \ (https://en.wikipedia.org/wiki/Dolby_Digital_Plus)\n\nDolby Digital Plus, also\
  \ known as Enhanced AC-3 (commonly abbreviated as DD+ or E-AC-3, or EC-3), is the\
  \ successor to Dolby Digital (AC-3). It is a digital audio compression scheme developed\
  \ by Dolby Labs for the transport and storage of multi-channel digital audio."
