name: SHO
includeCustomFormatWhenRenaming: true
description: 'SHOWTIME


  From Wikipedia, the free encyclopedia ()


  Paramount+ with Showtime, also known as Showtime (the former name of its main channel
  from 1976 to 2024, but still used for certain marketing and channel branding contexts),
  is an American premium television network and the flagship property of Showtime
  Networks, a sub-division of the Paramount Media Networks division of Paramount Global.
  Paramount+ with Showtime''s programming includes original television series produced
  exclusively for the linear network and developed for the co-owned Paramount+ streaming
  service, theatrically released and independent motion pictures, documentaries, and
  occasional stand-up comedy specials, made-for-TV movies and softcore adult programming.'
