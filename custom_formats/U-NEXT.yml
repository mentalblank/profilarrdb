description: 'U-NEXT


  U-NEXT is a Japanese subscription streaming service launched in 2007, and is one
  of Japan''s leading streaming platforms. It holds a 17.9% market share in Japan''s
  subscription streaming sector, ranking second only to Netflix. It offers a wide
  range of movies, dramas, anime, live sports, and original content, along with an
  extensive e-book and manga library. It is primarily available in Japan.


  For more information, visit the U-NEXT Wikipedia page (https://en.wikipedia.org/wiki/U-Next).'
