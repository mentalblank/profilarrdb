description: 'ROKU


  From Wikipedia, the free encyclopedia (https://en.wikipedia.org/wiki/The_Roku_Channel)


  The Roku Channel is an over-the-top streaming television service available in the
  United States, Canada, Mexico and the United Kingdom. The service was launched in
  2017, and is owned and operated by Roku, Inc. It is the most popular free ad-supported
  streaming television (FAST) service in the United States, reportedly reaching 145
  million people, as of 2024.'
