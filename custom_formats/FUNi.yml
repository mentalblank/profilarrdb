description: 'Funimation


  Funimation was an American anime streaming service launched in 2016, known for popular
  titles such as Dragon Ball, One Piece, Attack on Titan, and My Hero Academia. It
  was one of the leading distributors of anime in North America and was owned by Sony.
  On April 2, 2024, Funimation shut down and merged into Crunchyroll, where most of
  its content library is now available.


  For more information, visit the Funimation Wikipedia page (https://en.wikipedia.org/wiki/Funimation).'
