description: 'BSL (British Sign Language)


  BSL is a sign language used across the United Kingdom. It uses a two-handed alphabet
  and is part of the BANZSL language family, alongside Australian and New Zealand
  sign languages. BSL relies on body movement and hand shapes to convey meaning, and
  often follows a topic-comment sentence structure.


  For more information, visit the British Sign Language Wikipedia page (https://en.wikipedia.org/wiki/British_Sign_Language).'
