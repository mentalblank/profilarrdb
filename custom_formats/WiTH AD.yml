trash_id: 127bdbadcf3e4463a8c707759fbaad75
name: WiTH AD
includeCustomFormatWhenRenaming: true
description: 'With Audio Description


  - Definition: An additional narration track for blind or visually impaired audiences
  that describes important visual details on screen, such as scenery, costumes, facial
  expressions, and action scenes.

  - Purpose: To make audio-visual content (TV, movies, theatre) accessible by describing
  what is not audible in the main soundtrack.

  - Difference: Unlike BSL and ASL, which are full, visual languages for communication,
  Audio Description is an audio-based accessibility feature.


  From Wikipedia, the free encyclopedia ()


  Audio description (AD), also referred to as a video description, described video,
  or visual description, is a form of narration used to provide information surrounding
  key visual elements in a media work (such as a film or television program, or theatrical
  performance) for the benefit of blind and visually impaired consumers.


  Some releases are now available with Audio Description. These are flagged `WiTH
  AD` or just `AD` and should not be confused with advertisements.'
tags:
