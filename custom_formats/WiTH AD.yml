trash_id: 127bdbadcf3e4463a8c707759fbaad75
name: WiTH AD
includeCustomFormatWhenRenaming: true
description: "With Audio Description\n\nAudio Description (AD) is an extra narration\
  \ track that describes key visual details \u2014 such as scenery, costumes, and\
  \ actions \u2014 for blind or visually impaired viewers. It makes TV and film content\
  \ more accessible by explaining what cannot be heard in the main audio.\n\nSome\
  \ releases include Audio Description, marked as `WITH AD` or `AD`. Note: this is\
  \ not the same as advertisements.\n\nFor more information, visit the Audio Description\
  \ Wikipedia page (https://en.wikipedia.org/wiki/Audio_description)."
tags:
- Release Title
- Trash Guides
conditions:
- name: Audio Description
  negate: false
  required: true
  type: release_title
  _raw_pattern: \b((french|multi|with|((ba?|a)sl[ ._-]and))[ ._-](ad|audio[ ._-]description))\b
  pattern: Audio Description
