name: STAN
includeCustomFormatWhenRenaming: true
description: 'Stan


  From Wikipedia, the free encyclopedia ()


  Stan is an Australian over-the-top streaming service. The service offers a broad
  range of film and television content from both local and foreign productions, particularly
  from the United States and United Kingdom. Stan also includes a growing library
  of their own original film and television content. With over 2.6 million subscribers,
  as of June 2023 Stan is the fourth largest streaming service in Australia, behind
  Disney+, Amazon Prime Video and Netflix.'
