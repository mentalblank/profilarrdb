trash_id: b6832f586342ef70d9c128d40c07b872
name: Bad Dual Groups
includeCustomFormatWhenRenaming: false
description: 'Bad Dual/Multi groups


  These release groups do not use the original language of the media as the first
  audio track. Since ffprobe relies on the first audio track to determine the primary
  language of the release, incorrect ordering can lead to parsing issues. This may
  result in failed imports, misidentified files, or even download loops. To ensure
  proper handling, the original language should always be the first audio track in
  the release.'
tags:
