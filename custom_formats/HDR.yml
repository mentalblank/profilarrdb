trash_id: 493b6d1dbec3c3364c59d7607f7e3405
name: HDR
includeCustomFormatWhenRenaming: false
description: 'HDR


  All users with HDR-capable equipment should add the HDR custom format.


  *This is a catch-all custom format for all HDR-related formats, including those
  with HDR10 or HDR10+ fallback capabilities, such as DV HDR10 or DV HDR10+.*'
tags:
- Release Title
- Trash Guides
conditions:
- name: DV With HDR10 fallback
  negate: false
  required: false
  type: release_title
  _raw_pattern: ^(?=.*\b(dv|dovi|dolby[ .]?v(ision)?)\b)(?!(?=.*\b(web[ ._-]?(dl|rip)?)\b)(?!.*\b(hulu)\b))
  pattern: DV With HDR10 fallback
- name: HDR
  negate: false
  required: false
  type: release_title
  _raw_pattern: \b(hdr)\b
  pattern: HDR
- name: HDR10
  negate: false
  required: false
  type: release_title
  _raw_pattern: \b(hdr10(?![+]|p(lus)?))
  pattern: HDR10
- name: HDR10+
  negate: false
  required: false
  type: release_title
  _raw_pattern: \b(hdr10(?=[+]|p(lus)?))
  pattern: HDR10+
- name: HLG
  negate: false
  required: false
  type: release_title
  _raw_pattern: \b(hlg)\b
  pattern: HLG
- name: PQ
  negate: false
  required: false
  type: release_title
  _raw_pattern: \b(pq)\b
  pattern: PQ
- name: RlsGrp (Missing HDR)
  negate: false
  required: false
  type: release_title
  _raw_pattern: ^(?=.*\b(framestor|hqmux|sicfoi)\b)(?=.*\b(2160p)\b)(?!.*\b(hdr10([+]|p(lus)?)))(?!.*\b(sdr)\b).*
  pattern: RlsGrp (Missing HDR)
tests: []
