name: WiTH BASL
includeCustomFormatWhenRenaming: true
description: 'BASL (Black American Sign Language)


  BASL is a dialect of ASL used primarily by Black Deaf Americans, originating from
  segregated schools in the South. Compared to mainstream ASL, it uses a larger signing
  space, more two-handed signs, and greater emotional expression.


  For more information, visit the Black American Sign Language Wikipedia page (https://en.wikipedia.org/wiki/Black_American_Sign_Language).'
