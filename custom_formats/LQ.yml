trash_id: 90a6f9a284dff5103f6346090e6280c8
name: LQ
includeCustomFormatWhenRenaming: false
description: 'LQ


  - A collection of known low-quality groups (often banned from the top trackers due
  to their lack of quality), banned or dishonest release groups, or rips/encodes from
  the scene and quick-to-release P2P groups that, while adequate, are typically not
  regarded as high quality.

  - Release groups that disrupt the Starr apps automation because their poor naming
  could potentially create download loops, even if their overall quality is excellent.


  --8<-- "includes/cf-descriptions/apply-10000.md"'
