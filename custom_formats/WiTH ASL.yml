description: 'ASL (American Sign Language)


  ASL is a sign language used in the United States and English-speaking Canada. It
  uses a one-handed alphabet and was heavily influenced by French Sign Language (LSF).
  ASL relies on spatial organization and facial expressions to convey meaning and
  grammar.


  For more information, visit the American Sign Language Wikipedia page (https://en.wikipedia.org/wiki/American_Sign_Language).'
