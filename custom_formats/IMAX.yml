trash_id: eecf3a857724171f968a66cb5719e152
name: IMAX
includeCustomFormatWhenRenaming: false
description: 'IMAX


  From In Depth Cine (https://www.indepthcine.com/videos/imax)


  IMAX films are shot in tall aspect ratios, typically 1.9:1 or sometimes 1.43:1.
  Most IMAX film releases also have scenes shot at wider aspect ratios and, as a result,
  the aspect ratio will change throughout. Because they are shot on large format cameras,
  there is often less film grain present. This results in a clearer picture.'
tags:
- Release Title
- Trash Guides
conditions:
- name: IMAX
  negate: false
  required: true
  type: release_title
  _raw_pattern: \b((?<!non[ ._-])imax)\b
  pattern: IMAX
- name: 'NOT: IMAX Enhanced'
  negate: true
  required: true
  type: release_title
  _raw_pattern: ^(?=.*\b((dsnp|bc|b?core)\b|disney\+)(?=.*\bweb[ ._-]?(dl|rip)\b))(?=.*\b((?<!non[
    ._-])imax)\b)|^(?=.*\b(imax[ ._-]enhanced)\b)
  pattern: NOT - IMAX Enhanced
