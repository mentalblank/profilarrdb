trash_id: 923b6abef9b17f937fab56cfcf89e1f1
name: DV (w_o HDR fallback)
includeCustomFormatWhenRenaming: false
description: 'DV (w/o HDR fallback)


  If ^^NOT^^ every device accessing your media server supports Dolby Vision, add the
  DV (w/o HDR fallback) custom format to ensure maximum compatibility with your setup.
  This prevents playback issues on devices that don''t fully support Dolby Vision.


  *This also applies to Dolby Vision releases without HDR10 fallback (Profile 5).*'
tags:
- Release Group
- Release Title
- Source
- Trash Guides
